<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1045 310" role="img" aria-labelledby="title desc">
  <title id="title">Canvia</title>
  <desc id="desc">Canvia wordmark with three-leaf icon.</desc>
  <defs>
